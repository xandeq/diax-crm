name: Deploy API-Core to SmarterASP (FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "api-core/**"
      - ".github/workflows/deploy-api-core-smarterasp.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-api-core-smarterasp
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: api-core
        run: dotnet restore

      - name: Install dotnet-ef
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure DB Schema (baseline/reconcile)
        shell: pwsh
        run: |
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"
          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          $sqlLines = @(
            "SET NOCOUNT ON;",
            "",
            "-- 1) Garante tabela de histórico de migrations",
            "IF OBJECT_ID(N'[__EFMigrationsHistory]') IS NULL",
            "BEGIN",
            "  CREATE TABLE [__EFMigrationsHistory] (",
            "    [MigrationId] nvarchar(150) NOT NULL,",
            "    [ProductVersion] nvarchar(32) NOT NULL,",
            "    CONSTRAINT [PK___EFMigrationsHistory] PRIMARY KEY ([MigrationId])",
            "  );",
            "END",
            "",
            "-- 2) Garante tabela customers (sem dropar dados)",
            "IF OBJECT_ID(N'[customers]') IS NULL",
            "BEGIN",
            "  CREATE TABLE [customers] (",
            "    [id] uniqueidentifier NOT NULL,",
            "    [name] nvarchar(200) NOT NULL,",
            "    [company_name] nvarchar(200) NULL,",
            "    [person_type] int NOT NULL,",
            "    [document] nvarchar(14) NULL,",
            "    [email] nvarchar(255) NOT NULL,",
            "    [secondary_email] nvarchar(255) NULL,",
            "    [phone] nvarchar(20) NULL,",
            "    [whats_app] nvarchar(20) NULL,",
            "    [website] nvarchar(500) NULL,",
            "    [source] int NOT NULL,",
            "    [source_details] nvarchar(500) NULL,",
            "    [notes] nvarchar(4000) NULL,",
            "    [tags] nvarchar(500) NULL,",
            "    [status] int NOT NULL,",
            "    [converted_at] datetime2 NULL,",
            "    [last_contact_at] datetime2 NULL,",
            "    [created_at] datetime2 NOT NULL,",
            "    [created_by] nvarchar(100) NULL,",
            "    [updated_at] datetime2 NULL,",
            "    [updated_by] nvarchar(100) NULL,",
            "    CONSTRAINT [PK_customers] PRIMARY KEY ([id])",
            "  );",
            "END",
            "ELSE",
            "BEGIN",
            "  -- Adiciona colunas opcionais se estiverem faltando (evita quebra por Invalid column name)",
            "  IF COL_LENGTH('customers','document') IS NULL ALTER TABLE [customers] ADD [document] nvarchar(14) NULL;",
            "  IF COL_LENGTH('customers','company_name') IS NULL ALTER TABLE [customers] ADD [company_name] nvarchar(200) NULL;",
            "  IF COL_LENGTH('customers','secondary_email') IS NULL ALTER TABLE [customers] ADD [secondary_email] nvarchar(255) NULL;",
            "  IF COL_LENGTH('customers','phone') IS NULL ALTER TABLE [customers] ADD [phone] nvarchar(20) NULL;",
            "  IF COL_LENGTH('customers','whats_app') IS NULL ALTER TABLE [customers] ADD [whats_app] nvarchar(20) NULL;",
            "  IF COL_LENGTH('customers','website') IS NULL ALTER TABLE [customers] ADD [website] nvarchar(500) NULL;",
            "  IF COL_LENGTH('customers','source_details') IS NULL ALTER TABLE [customers] ADD [source_details] nvarchar(500) NULL;",
            "  IF COL_LENGTH('customers','notes') IS NULL ALTER TABLE [customers] ADD [notes] nvarchar(4000) NULL;",
            "  IF COL_LENGTH('customers','tags') IS NULL ALTER TABLE [customers] ADD [tags] nvarchar(500) NULL;",
            "  IF COL_LENGTH('customers','converted_at') IS NULL ALTER TABLE [customers] ADD [converted_at] datetime2 NULL;",
            "  IF COL_LENGTH('customers','last_contact_at') IS NULL ALTER TABLE [customers] ADD [last_contact_at] datetime2 NULL;",
            "  IF COL_LENGTH('customers','created_by') IS NULL ALTER TABLE [customers] ADD [created_by] nvarchar(100) NULL;",
            "  IF COL_LENGTH('customers','updated_at') IS NULL ALTER TABLE [customers] ADD [updated_at] datetime2 NULL;",
            "  IF COL_LENGTH('customers','updated_by') IS NULL ALTER TABLE [customers] ADD [updated_by] nvarchar(100) NULL;",
            "",
            "  -- Se as colunas obrigatórias não existirem, não dá pra corrigir com segurança aqui.",
            "  IF COL_LENGTH('customers','id') IS NULL",
            "     OR COL_LENGTH('customers','name') IS NULL",
            "     OR COL_LENGTH('customers','person_type') IS NULL",
            "     OR COL_LENGTH('customers','email') IS NULL",
            "     OR COL_LENGTH('customers','source') IS NULL",
            "     OR COL_LENGTH('customers','status') IS NULL",
            "     OR COL_LENGTH('customers','created_at') IS NULL",
            "  BEGIN",
            "    THROW 51000, 'Tabela customers já existe mas está incompatível com o schema esperado. Recomendação: usar um banco limpo (novo DB) ou dropar/recriar customers.', 1;",
            "  END",
            "END",
            "",
            "-- 3) Índices (cria somente se não existirem)",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Email' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE UNIQUE INDEX [IX_Customers_Email] ON [customers]([email]);",
            "",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Document' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE INDEX [IX_Customers_Document] ON [customers]([document]) WHERE [document] IS NOT NULL;",
            "",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Status' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE INDEX [IX_Customers_Status] ON [customers]([status]);",
            "",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Source' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE INDEX [IX_Customers_Source] ON [customers]([source]);",
            "",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Status_CreatedAt' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE INDEX [IX_Customers_Status_CreatedAt] ON [customers]([status], [created_at]);",
            "",
            "IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = N'IX_Customers_Name' AND object_id = OBJECT_ID(N'[customers]'))",
            "  CREATE INDEX [IX_Customers_Name] ON [customers]([name]);",
            "",
            "-- 4) Marca migration como aplicada (baseline)",
            "IF NOT EXISTS (SELECT 1 FROM [__EFMigrationsHistory] WHERE [MigrationId] = N'20251226100104_InitialCreate')",
            "  INSERT INTO [__EFMigrationsHistory]([MigrationId], [ProductVersion])",
            "  VALUES (N'20251226100104_InitialCreate', N'8.0.11');"
          )

          $sql = ($sqlLines -join "`n")

          $sqlConn = New-Object System.Data.SqlClient.SqlConnection($conn)
          $sqlConn.Open()
          try {
            $cmd = $sqlConn.CreateCommand()
            $cmd.CommandTimeout = 120
            $cmd.CommandText = $sql
            [void]$cmd.ExecuteNonQuery()
          }
          finally {
            $sqlConn.Close()
          }

      - name: Apply EF Core Migrations (remote DB)
        shell: pwsh
        run: |
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"
          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          dotnet ef database update `
            --project "api-core/src/Diax.Infrastructure/Diax.Infrastructure.csproj" `
            --startup-project "api-core/src/Diax.Api/Diax.Api.csproj" `
            --connection "$conn"

      - name: Publish (Release)
        working-directory: api-core
        run: dotnet publish "src/Diax.Api/Diax.Api.csproj" -c Release -o "${{ github.workspace }}/_publish"

      - name: Inject DB ConnectionString (appsettings.Production.json)
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}/_publish"
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"

          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          $payload = @{ ConnectionStrings = @{ DefaultConnection = $conn } }
          $json = $payload | ConvertTo-Json -Depth 5
          $path = Join-Path $publishDir "appsettings.Production.json"
          Set-Content -Path $path -Value $json -Encoding utf8

      - name: Take App Offline (app_offline.htm)
        shell: pwsh
        run: |
          $server = "${{ secrets.SMARTERASP_FTP_SERVER }}"
          $username = "${{ secrets.SMARTERASP_FTP_USERNAME }}"
          $password = "${{ secrets.SMARTERASP_FTP_PASSWORD }}"
          $remoteDir = "${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}"

          if ([string]::IsNullOrWhiteSpace($server) -or [string]::IsNullOrWhiteSpace($username) -or [string]::IsNullOrWhiteSpace($password)) {
            throw "Secrets de FTP não estão definidos."
          }

          $remoteDir = $remoteDir.Trim()
          if (-not $remoteDir.StartsWith("/")) { $remoteDir = "/" + $remoteDir }
          if (-not $remoteDir.EndsWith("/")) { $remoteDir = $remoteDir + "/" }

          $uri = "ftp://$server$remoteDir" + "app_offline.htm"
          $body = "<html><head><title>Offline</title></head><body><h1>Atualizando...</h1></body></html>"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)

          $req = [System.Net.FtpWebRequest]::Create($uri)
          $req.Method = [System.Net.WebRequestMethods+Ftp]::UploadFile
          $req.Credentials = New-Object System.Net.NetworkCredential($username, $password)
          $req.UseBinary = $true
          $req.KeepAlive = $false

          $stream = $req.GetRequestStream()
          $stream.Write($bytes, 0, $bytes.Length)
          $stream.Close()

          $resp = $req.GetResponse()
          $resp.Close()

          Start-Sleep -Seconds 8

      - name: Deploy via FTP (SmarterASP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          local-dir: "${{ github.workspace }}/_publish/"
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/appsettings.Development.json

      - name: Bring App Online (remove app_offline.htm)
        shell: pwsh
        run: |
          $server = "${{ secrets.SMARTERASP_FTP_SERVER }}"
          $username = "${{ secrets.SMARTERASP_FTP_USERNAME }}"
          $password = "${{ secrets.SMARTERASP_FTP_PASSWORD }}"
          $remoteDir = "${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}"

          $remoteDir = $remoteDir.Trim()
          if (-not $remoteDir.StartsWith("/")) { $remoteDir = "/" + $remoteDir }
          if (-not $remoteDir.EndsWith("/")) { $remoteDir = $remoteDir + "/" }

          $uri = "ftp://$server$remoteDir" + "app_offline.htm"

          try {
            $req = [System.Net.FtpWebRequest]::Create($uri)
            $req.Method = [System.Net.WebRequestMethods+Ftp]::DeleteFile
            $req.Credentials = New-Object System.Net.NetworkCredential($username, $password)
            $req.KeepAlive = $false
            $resp = $req.GetResponse()
            $resp.Close()
          }
          catch {
            Write-Host "Aviso: não foi possível remover app_offline.htm (ok se já não existir)."
          }
