name: Deploy API-Core to SmarterASP (FTP)

# Trigger note: commits com "[reset-db]" no message permitem reset do schema remoto.

on:
  push:
    branches: ["main"]
    paths:
      - "api-core/**"
      - ".github/workflows/deploy-api-core-smarterasp.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-api-core-smarterasp
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      RESET_DB: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[reset-db]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: api-core
        run: dotnet restore

      - name: Install dotnet-ef
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure DB Schema (baseline/reconcile)
        shell: pwsh
        run: |
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"
          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          $resetDb = ($env:RESET_DB -match '^(?i:true|1)$')

          $sqlConn = New-Object System.Data.SqlClient.SqlConnection($conn)
          $sqlConn.Open()
          try {
            $cmd = $sqlConn.CreateCommand()
            $cmd.CommandTimeout = 120

            # Se o schema do banco estiver incompatível (ex.: tabela customers antiga),
            # a opção segura é recriar (apaga dados) via flag [reset-db] na mensagem do commit.
            $cmd.CommandText = "SELECT CASE WHEN OBJECT_ID(N'[customers]') IS NULL THEN 0 ELSE 1 END"
            $customersExists = [int]$cmd.ExecuteScalar()

            if ($customersExists -eq 1) {
              $cmd.CommandText = "SELECT " +
                "CASE WHEN COL_LENGTH('customers','id') IS NULL THEN 1 ELSE 0 END AS MissingId, " +
                "CASE WHEN COL_LENGTH('customers','name') IS NULL THEN 1 ELSE 0 END AS MissingName, " +
                "CASE WHEN COL_LENGTH('customers','person_type') IS NULL THEN 1 ELSE 0 END AS MissingPersonType, " +
                "CASE WHEN COL_LENGTH('customers','email') IS NULL THEN 1 ELSE 0 END AS MissingEmail, " +
                "CASE WHEN COL_LENGTH('customers','source') IS NULL THEN 1 ELSE 0 END AS MissingSource, " +
                "CASE WHEN COL_LENGTH('customers','status') IS NULL THEN 1 ELSE 0 END AS MissingStatus, " +
                "CASE WHEN COL_LENGTH('customers','created_at') IS NULL THEN 1 ELSE 0 END AS MissingCreatedAt;"
              $reader = $cmd.ExecuteReader()
              $missing = @()
              if ($reader.Read()) {
                if ($reader.GetInt32(0) -eq 1) { $missing += 'id' }
                if ($reader.GetInt32(1) -eq 1) { $missing += 'name' }
                if ($reader.GetInt32(2) -eq 1) { $missing += 'person_type' }
                if ($reader.GetInt32(3) -eq 1) { $missing += 'email' }
                if ($reader.GetInt32(4) -eq 1) { $missing += 'source' }
                if ($reader.GetInt32(5) -eq 1) { $missing += 'status' }
                if ($reader.GetInt32(6) -eq 1) { $missing += 'created_at' }
              }
              $reader.Close()

              if ($missing.Count -gt 0) {
                if (-not $resetDb) {
                  throw "Tabela customers incompatível (faltando: $($missing -join ', ')). Faça um commit no branch main contendo '[reset-db]' (isso apaga dados) ou aponte a connection string para um banco novo/limpo."
                }

                Write-Host "RESET_DB=true: dropando customers e __EFMigrationsHistory para recriar via migrations."
                $cmd.CommandText = "IF OBJECT_ID(N'[customers]') IS NOT NULL DROP TABLE [customers]; IF OBJECT_ID(N'[__EFMigrationsHistory]') IS NOT NULL DROP TABLE [__EFMigrationsHistory];"
                [void]$cmd.ExecuteNonQuery()
              }
            }
          }
          finally {
            $sqlConn.Close()
          }

      - name: Apply EF Core Migrations (remote DB)
        shell: pwsh
        run: |
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"
          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          dotnet ef database update `
            --project "api-core/src/Diax.Infrastructure/Diax.Infrastructure.csproj" `
            --startup-project "api-core/src/Diax.Api/Diax.Api.csproj" `
            --connection "$conn"

      - name: Publish (Release)
        working-directory: api-core
        run: dotnet publish "src/Diax.Api/Diax.Api.csproj" -c Release -o "${{ github.workspace }}/_publish"

      - name: Inject DB ConnectionString (appsettings.Production.json)
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}/_publish"
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"

          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          $payload = @{ ConnectionStrings = @{ DefaultConnection = $conn } }
          $json = $payload | ConvertTo-Json -Depth 5
          $path = Join-Path $publishDir "appsettings.Production.json"
          Set-Content -Path $path -Value $json -Encoding utf8

      - name: Take App Offline (app_offline.htm)
        shell: pwsh
        run: |
          $server = "${{ secrets.SMARTERASP_FTP_SERVER }}"
          $username = "${{ secrets.SMARTERASP_FTP_USERNAME }}"
          $password = "${{ secrets.SMARTERASP_FTP_PASSWORD }}"
          $remoteDir = "${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}"

          if ([string]::IsNullOrWhiteSpace($server) -or [string]::IsNullOrWhiteSpace($username) -or [string]::IsNullOrWhiteSpace($password)) {
            throw "Secrets de FTP não estão definidos."
          }

          $remoteDir = $remoteDir.Trim()
          if (-not $remoteDir.StartsWith("/")) { $remoteDir = "/" + $remoteDir }
          if (-not $remoteDir.EndsWith("/")) { $remoteDir = $remoteDir + "/" }

          $uri = "ftp://$server$remoteDir" + "app_offline.htm"
          $body = "<html><head><title>Offline</title></head><body><h1>Atualizando...</h1></body></html>"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)

          $req = [System.Net.FtpWebRequest]::Create($uri)
          $req.Method = [System.Net.WebRequestMethods+Ftp]::UploadFile
          $req.Credentials = New-Object System.Net.NetworkCredential($username, $password)
          $req.UseBinary = $true
          $req.KeepAlive = $false

          $stream = $req.GetRequestStream()
          $stream.Write($bytes, 0, $bytes.Length)
          $stream.Close()

          $resp = $req.GetResponse()
          $resp.Close()

          Start-Sleep -Seconds 8

      - name: Deploy via FTP (SmarterASP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          local-dir: "${{ github.workspace }}/_publish/"
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/appsettings.Development.json

      - name: Bring App Online (remove app_offline.htm)
        shell: pwsh
        run: |
          $server = "${{ secrets.SMARTERASP_FTP_SERVER }}"
          $username = "${{ secrets.SMARTERASP_FTP_USERNAME }}"
          $password = "${{ secrets.SMARTERASP_FTP_PASSWORD }}"
          $remoteDir = "${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}"

          $remoteDir = $remoteDir.Trim()
          if (-not $remoteDir.StartsWith("/")) { $remoteDir = "/" + $remoteDir }
          if (-not $remoteDir.EndsWith("/")) { $remoteDir = $remoteDir + "/" }

          $uri = "ftp://$server$remoteDir" + "app_offline.htm"

          try {
            $req = [System.Net.FtpWebRequest]::Create($uri)
            $req.Method = [System.Net.WebRequestMethods+Ftp]::DeleteFile
            $req.Credentials = New-Object System.Net.NetworkCredential($username, $password)
            $req.KeepAlive = $false
            $resp = $req.GetResponse()
            $resp.Close()
          }
          catch {
            Write-Host "Aviso: não foi possível remover app_offline.htm (ok se já não existir)."
          }
