name: Deploy API-Core to SmarterASP (FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "api-core/**"
      - ".github/workflows/deploy-api-core-smarterasp.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-api-core-smarterasp
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('api-core/**/*.csproj', 'api-core/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: api-core
        run: dotnet restore

      - name: Build (Release)
        working-directory: api-core
        run: dotnet build --configuration Release --no-restore

      - name: Publish (Release)
        working-directory: api-core
        run: dotnet publish src/Diax.Api/Diax.Api.csproj --configuration Release --no-build --output ./publish

      - name: Create appsettings.Production.json
        shell: bash
        run: |
          cat > ./api-core/publish/appsettings.Production.json << 'EOF'
          {
            "ConnectionStrings": {
              "DefaultConnection": "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"
            },
            "Jwt": {
              "Key": "${{ secrets.DIAX_JWT_KEY }}"
            },
            "Auth": {
              "AdminEmail": "${{ secrets.DIAX_AUTH_ADMIN_EMAIL }}",
              "AdminPassword": "${{ secrets.DIAX_AUTH_ADMIN_PASSWORD }}"
            },
            "Cors": {
              "AllowedOrigins": [
                "https://crm.alexandrequeiroz.com.br",
                "http://localhost:3000"
              ]
            },
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            },
            "AllowedHosts": "*"
          }
          EOF

      - name: Ensure web.config in publish
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_DIR="./api-core/publish"
          if [ ! -d "$PUBLISH_DIR" ]; then
            echo "Pasta publish não existe" >&2
            exit 1
          fi
          SRC_WEB=$(find api-core -maxdepth 8 -type f -name "web.config" | head -n 1 || true)
          if [ -n "$SRC_WEB" ]; then
            cp "$SRC_WEB" "$PUBLISH_DIR/web.config"
            echo "web.config copiado de: $SRC_WEB"
            exit 0
          fi
          cat > "$PUBLISH_DIR/web.config" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified"/>
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\Diax.Api.dll" stdoutLogEnabled="false" stdoutLogFile=".\logs\stdout" hostingModel="InProcess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          EOF
          echo "web.config gerado"

      - name: Create app_offline.htm
        shell: bash
        run: |
          mkdir -p ./offline
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RUN="${GITHUB_RUN_ID:-no-run-id}"
          cat > ./offline/app_offline.htm << EOF
          <!DOCTYPE html>
          <html lang="pt-BR"><head><meta charset="utf-8">
          <title>Atualizando...</title></head>
          <body style="font-family:Arial;display:grid;place-items:center;height:100vh">
            <div>
              <h2>Estamos publicando uma atualização</h2>
              <p>Tente novamente em instantes.</p>
              <small>deploy: ${TS} | run: ${RUN}</small>
            </div>
          </body></html>
          EOF

      - name: Delete old app_offline.htm (best-effort)
        shell: bash
        run: |
          curl --silent --show-error --fail \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --quote "DELE ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}app_offline.htm" \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/" || true

      - name: Put app_offline.htm on server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./offline/
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-state.offline.json
          timeout: 120000
          dangerous-clean-slate: false
          log-level: standard

      - name: Wait IIS to unload app
        run: sleep 15

      - name: Deploy via FTP (SmarterASP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./api-core/publish/
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-state.json
          timeout: 180000
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/appsettings.Development.json
            **/*.pdb
            **/*.xml
            **/*.md

      - name: Remove app_offline.htm
        shell: bash
        run: |
          curl --silent --show-error --fail \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --quote "DELE ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}app_offline.htm" \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/" || true
