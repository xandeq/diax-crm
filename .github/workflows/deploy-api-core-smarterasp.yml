name: Deploy API-Core to SmarterASP (FTP)

'on':
  push:
    branches: [ "main" ]
    paths:
      - "api-core/**"
      - ".github/workflows/deploy-api-core-smarterasp.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-api-core-smarterasp
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: api-core
        run: dotnet restore

      - name: Publish (Release)
        working-directory: api-core
        run: dotnet publish "src/Diax.Api/Diax.Api.csproj" -c Release -o "${{ github.workspace }}/_publish"

      - name: Inject DB ConnectionString (web.config)
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}/_publish"
          $webConfigPath = Join-Path $publishDir "web.config"
          $conn = "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}"

          if ([string]::IsNullOrWhiteSpace($conn)) {
            throw "SMARTERASP_DB_CONNECTIONSTRING não está definido."
          }

          $xml = @"
<?xml version=\"1.0\" encoding=\"utf-8\"?>
<configuration>
  <system.webServer>
    <handlers>
      <add name=\"aspNetCore\" path=\"*\" verb=\"*\" modules=\"AspNetCoreModuleV2\" resourceType=\"Unspecified\" />
    </handlers>
    <aspNetCore processPath=\"dotnet\" arguments=\".\\Diax.Api.dll\" stdoutLogEnabled=\"false\" hostingModel=\"inprocess\">
      <environmentVariables>
        <environmentVariable name=\"ASPNETCORE_ENVIRONMENT\" value=\"Production\" />
        <environmentVariable name=\"DIAX_ConnectionStrings__DefaultConnection\" value=\"$conn\" />
      </environmentVariables>
    </aspNetCore>
  </system.webServer>
</configuration>
"@

          Set-Content -Path $webConfigPath -Value $xml -Encoding utf8

      - name: Deploy via FTP (SmarterASP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          local-dir: "${{ github.workspace }}/_publish/"
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/appsettings.Development.json
