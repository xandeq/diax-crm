name: Deploy API-Core to SmarterASP (FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "api-core/**"
      - ".github/workflows/deploy-api-core-smarterasp.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-core-smarterasp
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('api-core/**/*.csproj', 'api-core/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: api-core
        run: dotnet restore

      - name: Clean publish folder
        shell: bash
        working-directory: api-core
        run: |
          rm -rf ./publish
          mkdir -p ./publish

      - name: Publish (Release)
        working-directory: api-core
        run: |
          dotnet publish src/Diax.Api/Diax.Api.csproj --configuration Release --output ./publish

          # Verify critical DLLs are present
          echo "=== Verifying published files ==="
          MISSING_DLLS=0

          for dll in "Diax.Api.dll" "Serilog.dll" "Swashbuckle.AspNetCore.Swagger.dll" "Swashbuckle.AspNetCore.SwaggerGen.dll" "Swashbuckle.AspNetCore.SwaggerUI.dll"; do
            if [ ! -f "./publish/$dll" ]; then
              echo "ERROR: $dll not found!" >&2
              MISSING_DLLS=1
            else
              echo "✓ $dll found"
            fi
          done

          if [ $MISSING_DLLS -eq 1 ]; then
            echo "=== All DLLs in publish folder ===" >&2
            ls -la ./publish/*.dll
            exit 1
          fi

          echo "Total DLLs published: $(ls -1 ./publish/*.dll | wc -l)"

      - name: Create appsettings.Production.json
        shell: bash
        run: |
          # Use jq for proper JSON escaping (handles quotes, backslashes, special chars)
          jq -n \
            --arg connStr "${{ secrets.SMARTERASP_DB_CONNECTIONSTRING }}" \
            --arg jwtKey "${{ secrets.DIAX_JWT_KEY }}" \
            --arg adminEmail "${{ secrets.DIAX_AUTH_ADMIN_EMAIL }}" \
            --arg adminPass "${{ secrets.DIAX_AUTH_ADMIN_PASSWORD }}" \
            --arg openaiKey "${{ secrets.OPENAI_API_KEY }}" \
            --arg perplexityKey "${{ secrets.PERPLEXITY_API_KEY }}" \
            --arg deepseekKey "${{ secrets.DEEPSEEK_API_KEY }}" \
            --arg geminiKey "${{ secrets.GEMINI_API_KEY }}" \
            --arg openrouterKey "${{ secrets.OPENROUTER_API_KEY }}" \
            --arg grokKey "${{ secrets.GROK_API_KEY }}" \
            --arg hfKey "${{ secrets.HF_API_KEY }}" \
            --arg falKey "${{ secrets.FALAI_API_KEY }}" \
            --arg groqKey "${{ secrets.GROQ_API_KEY }}" \
            --arg cerebrasKey "${{ secrets.CEREBRAS_API_KEY }}" \
            --arg anthropicKey "${{ secrets.ANTHROPIC_API_KEY }}" \
            --arg brevoApiKey "${{ secrets.BREVO_API_KEY }}" \
            --arg brevoWebhookSecret "${{ secrets.BREVO_WEBHOOK_SECRET }}" \
            --arg smtpHost "${{ secrets.SMTP_HOST }}" \
            --argjson smtpPort 465 \
            --arg smtpUsername "${{ secrets.SMTP_USERNAME }}" \
            --arg smtpPassword "${{ secrets.SMTP_PASSWORD }}" \
            --arg smtpFromEmail "${{ secrets.SMTP_FROM_EMAIL }}" \
            --arg extractorUrl "${{ secrets.EXTRATOR_URL }}" \
            --arg extractorToken "${{ secrets.EXTRATOR_API_TOKEN }}" \
            --arg serviceApiKey "${{ secrets.DIAX_SERVICE_API_KEY }}" \
            '{
              "ConnectionStrings": {
                "DefaultConnection": $connStr
              },
              "Jwt": {
                "Key": $jwtKey
              },
              "Auth": {
                "AdminEmail": $adminEmail,
                "AdminPassword": $adminPass
              },
              "PromptGenerator": {
                "TimeoutSeconds": 30,
                "OpenAI": {
                  "ApiKey": $openaiKey,
                  "BaseUrl": "https://api.openai.com/v1",
                  "Model": "gpt-4o-mini"
                },
                "Perplexity": {
                  "ApiKey": $perplexityKey,
                  "BaseUrl": "https://api.perplexity.ai",
                  "Model": "sonar-pro"
                },
                "DeepSeek": {
                  "ApiKey": $deepseekKey,
                  "BaseUrl": "https://api.deepseek.com",
                  "Model": "deepseek-chat"
                },
                "Gemini": {
                  "ApiKey": $geminiKey,
                  "BaseUrl": "https://generativelanguage.googleapis.com/v1beta",
                  "Model": "gemini-2.5-flash"
                },
                "OpenRouter": {
                  "ApiKey": $openrouterKey,
                  "BaseUrl": "https://openrouter.ai/api/v1",
                  "Model": "openai/gpt-4o-mini"
                },
                "Grok": {
                  "ApiKey": $grokKey,
                  "BaseUrl": "https://api.x.ai/v1",
                  "Model": "grok-2-image"
                },
                "HuggingFace": {
                  "ApiKey": $hfKey,
                  "BaseUrl": "https://router.huggingface.co/v1",
                  "Model": "meta-llama/Meta-Llama-3.1-8B-Instruct"
                },
                "FAL": {
                  "ApiKey": $falKey,
                  "BaseUrl": "https://fal.run",
                  "Model": "fal-ai/flux/schnell"
                },
                "Groq": {
                  "ApiKey": $groqKey,
                  "BaseUrl": "https://api.groq.com/openai/v1",
                  "Model": "llama-3.3-70b-versatile"
                },
                "Cerebras": {
                  "ApiKey": $cerebrasKey,
                  "BaseUrl": "https://api.cerebras.ai/v1",
                  "Model": "llama-3.3-70b"
                },
                "Anthropic": {
                  "ApiKey": $anthropicKey,
                  "BaseUrl": "https://api.anthropic.com",
                  "Model": "claude-3-5-haiku-20241022"
                }
              },
              "Brevo": {
                "ApiKey": $brevoApiKey,
                "FromEmail": "contato@alexandrequeiroz.com.br",
                "FromName": "Alexandre Queiroz Marketing Digital",
                "ReplyTo": "contato@alexandrequeiroz.com.br",
                "WebhookSecret": $brevoWebhookSecret
              },
              "Email": {
                "SmtpHost": $smtpHost,
                "SmtpPort": $smtpPort,
                "EnableSsl": true,
                "SmtpUsername": $smtpUsername,
                "SmtpPassword": $smtpPassword,
                "FromEmail": $smtpFromEmail,
                "FromName": "Alexandre Queiroz"
              },
              "Extrator": {
                "Url": $extractorUrl,
                "ApiToken": $extractorToken
              },
              "ServiceApiKey": $serviceApiKey,
              "Cors": {
                "AllowedOrigins": [
                  "https://crm.alexandrequeiroz.com.br",
                  "http://localhost:3000"
                ]
              },
              "Logging": {
                "LogLevel": {
                  "Default": "Information",
                  "Microsoft.AspNetCore": "Warning"
                }
              },
              "AllowedHosts": "*"
            }' > ./api-core/publish/appsettings.Production.json

          # Verify the file was created and is valid JSON
          if ! jq empty ./api-core/publish/appsettings.Production.json 2>/dev/null; then
            echo "ERROR: Generated appsettings.Production.json is not valid JSON" >&2
            exit 1
          fi

      - name: Ensure web.config in publish
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_DIR="./api-core/publish"
          if [ ! -d "$PUBLISH_DIR" ]; then
            echo "Pasta publish não existe" >&2
            exit 1
          fi
          # Busca web.config excluindo o diretório publish
          SRC_WEB=$(find api-core -maxdepth 8 -type f -name "web.config" -not -path "*/publish/*" | head -n 1 || true)
          if [ -n "$SRC_WEB" ]; then
            cp "$SRC_WEB" "$PUBLISH_DIR/web.config"
            echo "web.config copiado de: $SRC_WEB"
            exit 0
          fi
          # Se não encontrou, verifica se já existe no publish
          if [ -f "$PUBLISH_DIR/web.config" ]; then
            echo "web.config já existe no publish"
            exit 0
          fi
          # Gera web.config padrão
          cat > "$PUBLISH_DIR/web.config" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified"/>
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\Diax.Api.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="OutOfProcess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          EOF
          echo "web.config gerado"

      - name: Create app_offline.htm
        shell: bash
        run: |
          mkdir -p ./offline
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RUN="${GITHUB_RUN_ID:-no-run-id}"
          cat > ./offline/app_offline.htm << EOF
          <!DOCTYPE html>
          <html lang="pt-BR"><head><meta charset="utf-8">
          <title>Atualizando...</title></head>
          <body style="font-family:Arial;display:grid;place-items:center;height:100vh">
            <div>
              <h2>Estamos publicando uma atualização</h2>
              <p>Tente novamente em instantes.</p>
              <small>deploy: ${TS} | run: ${RUN}</small>
            </div>
          </body></html>
          EOF

      - name: Delete old app_offline.htm (best-effort)
        shell: bash
        run: |
          curl --silent --show-error --fail \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --quote "DELE ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}app_offline.htm" \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/" || true

      - name: Create required directories on server (best-effort)
        shell: bash
        run: |
          # Create App_Data/logs for ANCM stdout logging
          curl --silent --show-error \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --ftp-create-dirs \
            --upload-file /dev/null \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}App_Data/logs/.keep" || true

          # Create logs for Serilog file sink
          curl --silent --show-error \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --ftp-create-dirs \
            --upload-file /dev/null \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}logs/.keep" || true

          # Create App_Data/DataProtection-Keys for ASP.NET Core Data Protection key persistence
          # This prevents "Failed to decrypt API key" after deploys (ephemeral keys lost on restart)
          curl --silent --show-error \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --ftp-create-dirs \
            --upload-file /dev/null \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}App_Data/DataProtection-Keys/.keep" || true

      - name: Put app_offline.htm on server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./offline/
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-state.offline.json
          timeout: 120000
          dangerous-clean-slate: false
          log-level: standard

      - name: Wait IIS to unload app
        run: sleep 15

      - name: Deploy via FTP (SmarterASP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_SERVER }}
          username: ${{ secrets.SMARTERASP_FTP_USERNAME }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./api-core/publish/
          server-dir: ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-state.v2.json
          timeout: 180000
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/appsettings.Development.json
            **/*.pdb
            **/*.xml
            **/*.md

      - name: Remove app_offline.htm
        shell: bash
        run: |
          curl --silent --show-error --fail \
            --user "${{ secrets.SMARTERASP_FTP_USERNAME }}:${{ secrets.SMARTERASP_FTP_PASSWORD }}" \
            --quote "DELE ${{ secrets.SMARTERASP_FTP_REMOTE_DIR }}app_offline.htm" \
            "ftp://${{ secrets.SMARTERASP_FTP_SERVER }}/" || true
