name: Deploy CRM Web (HostGator FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "crm-web/**"
      - ".github/workflows/deploy-crm-web-hostgator.yml"
  workflow_dispatch:

concurrency:
  group: deploy-crm-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crm-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required secrets
        env:
          HOSTGATOR_FTP_SERVER: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          HOSTGATOR_FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          HOSTGATOR_FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          HOSTGATOR_FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
          CRM_WEB_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: |
          missing=0
          check() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          }

          check "HOSTGATOR_FTP_SERVER" "$HOSTGATOR_FTP_SERVER"
          check "HOSTGATOR_FTP_USERNAME" "$HOSTGATOR_FTP_USERNAME"
          check "HOSTGATOR_FTP_PASSWORD" "$HOSTGATOR_FTP_PASSWORD"
          check "HOSTGATOR_FTP_REMOTE_DIR" "$HOSTGATOR_FTP_REMOTE_DIR"
          check "CRM_WEB_API_BASE_URL" "$CRM_WEB_API_BASE_URL"

          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required secrets are missing. Run scripts/set-github-secrets-frontend.ps1 (or set them in GitHub Settings > Secrets and variables > Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (static export)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: npm run build

      - name: Network diagnostics (FTP)
        env:
          HOST: ${{ secrets.HOSTGATOR_FTP_SERVER }}
        run: |
          echo "Host: $HOST"
          echo "DNS (getent hosts):"
          getent hosts "$HOST" || true

          test_port() {
            port="$1"
            echo "Testing TCP $HOST:$port ..."
            if timeout 8 bash -lc "cat < /dev/null > /dev/tcp/$HOST/$port" 2>/dev/null; then
              echo "OK: TCP $HOST:$port reachable"
            else
              echo "FAIL: TCP $HOST:$port not reachable (timeout/refused/blocked)"
            fi
          }

          test_port 21
          test_port 990
          test_port 22

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          username: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 120000
          local-dir: crm-web/out/
          server-dir: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/node_modules/**
