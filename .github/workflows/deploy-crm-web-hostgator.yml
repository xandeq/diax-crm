name: Deploy CRM Web (HostGator FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "crm-web/**"
      - ".github/workflows/deploy-crm-web-hostgator.yml"
  workflow_dispatch:

concurrency:
  group: deploy-crm-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm-web/package-lock.json

      - name: Install dependencies
        working-directory: crm-web
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        working-directory: crm-web
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          username: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          local-dir: ./crm-web/out/
          server-dir: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          timeout: 30000
          log-level: minimal
