name: Deploy CRM Web (HostGator FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "crm-web/**"
      - ".github/workflows/deploy-crm-web-hostgator.yml"
  workflow_dispatch:

concurrency:
  group: deploy-crm-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment: production

    defaults:
      run:
        working-directory: crm-web
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm-web/package-lock.json

      - name: Validate required secrets
        env:
          HOSTGATOR_FTP_SERVER: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          HOSTGATOR_FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          HOSTGATOR_FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          HOSTGATOR_FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
          CRM_WEB_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: |
          $missing = $false
          function Check-Secret([string]$name, [string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              Write-Host "::error::Missing required secret: $name"
              $script:missing = $true
            }
          }
          Check-Secret "HOSTGATOR_FTP_SERVER" $env:HOSTGATOR_FTP_SERVER
          Check-Secret "HOSTGATOR_FTP_USERNAME" $env:HOSTGATOR_FTP_USERNAME
          Check-Secret "HOSTGATOR_FTP_PASSWORD" $env:HOSTGATOR_FTP_PASSWORD
          Check-Secret "HOSTGATOR_FTP_REMOTE_DIR" $env:HOSTGATOR_FTP_REMOTE_DIR
          Check-Secret "CRM_WEB_API_BASE_URL" $env:CRM_WEB_API_BASE_URL
          if ($missing) { exit 1 }

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: npm run build

      - name: Network diagnostics (FTP)
        env:
          HOST: ${{ secrets.HOSTGATOR_FTP_SERVER }}
        run: |
          Write-Host "Host: $env:HOST"
          try {
            $dns = Resolve-DnsName -Name $env:HOST -Type A -ErrorAction Stop
            $ips = $dns | Where-Object { $_.IPAddress } | Select-Object -ExpandProperty IPAddress
            if ($ips) { Write-Host ("DNS A: " + ($ips -join ', ')) }
          } catch { Write-Host "DNS lookup failed: $($_.Exception.Message)" }
          foreach ($port in @(21)) {
            $res = Test-NetConnection -ComputerName $env:HOST -Port $port -WarningAction SilentlyContinue
            Write-Host "TCP $($env:HOST):$port -> $($res.TcpTestSucceeded)"
          }

      - name: Deploy via FTP (parallel curl)
        env:
          FTP_SERVER: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          FTP_USER: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          $localDir   = Join-Path $env:GITHUB_WORKSPACE "crm-web\out"
          $server     = $env:FTP_SERVER
          $remoteBase = $env:FTP_REMOTE_DIR.TrimEnd('/')
          $userPass   = "$($env:FTP_USER):$($env:FTP_PASS)"

          Write-Host "Uploading $localDir -> ftp://$server$remoteBase"

          $files = Get-ChildItem -Path $localDir -Recurse -File
          $total = $files.Count
          Write-Host "Files to upload: $total (parallel, 8 threads)"

          # Build file info list for parallel processing
          $fileInfos = $files | ForEach-Object {
            $rel = $_.FullName.Substring($localDir.Length).TrimStart('\').Replace('\', '/')
            $encodedRel = ($rel.Split('/') | ForEach-Object { [System.Uri]::EscapeDataString($_) }) -join '/'
            [PSCustomObject]@{
              FullName   = $_.FullName
              RemoteUrl  = "ftp://$server$remoteBase/$encodedRel"
              RelPath    = $rel
            }
          }

          # Upload in parallel — 8 threads (HostGator allows ~10 simultaneous FTP connections)
          $results = $fileInfos | ForEach-Object -Parallel {
            $f        = $_
            $userPass = $using:userPass
            $out = curl.exe --user $userPass `
              --upload-file $f.FullName `
              $f.RemoteUrl `
              --ftp-create-dirs `
              --ftp-pasv `
              --globoff `
              --retry 2 `
              --retry-delay 3 `
              --connect-timeout 30 `
              --max-time 120 `
              --silent `
              --show-error 2>&1
            [PSCustomObject]@{ Rel = $f.RelPath; Exit = $LASTEXITCODE; Msg = $out }
          } -ThrottleLimit 8

          $errors = $results | Where-Object { $_.Exit -ne 0 }
          $errors | ForEach-Object { Write-Host "  FAIL [$($_.Exit)]: $($_.Rel) -- $($_.Msg)" }

          $ok = $total - $errors.Count
          Write-Host "[$ok/$total] uploaded (errors: $($errors.Count))"

          if ($errors.Count -gt 0) {
            Write-Host "::error::Deploy completed with $($errors.Count) upload failures out of $total files."
            exit 1
          }
          Write-Host "Deploy complete: $total files uploaded successfully."
