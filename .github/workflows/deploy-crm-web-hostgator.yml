name: Deploy CRM Web (HostGator FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "crm-web/**"
      - ".github/workflows/deploy-crm-web-hostgator.yml"
  workflow_dispatch:

concurrency:
  group: deploy-crm-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: crm-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm-web/package-lock.json

      - name: Validate required secrets
        env:
          HOSTGATOR_FTP_SERVER: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          HOSTGATOR_FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          HOSTGATOR_FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          HOSTGATOR_FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
          CRM_WEB_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: |
          missing=false
          for var in HOSTGATOR_FTP_SERVER HOSTGATOR_FTP_USERNAME HOSTGATOR_FTP_PASSWORD HOSTGATOR_FTP_REMOTE_DIR CRM_WEB_API_BASE_URL; do
            val=$(eval echo "\$$var")
            if [ -z "$val" ]; then
              echo "::error::Missing required secret: $var"
              missing=true
            fi
          done
          if [ "$missing" = "true" ]; then exit 1; fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Network diagnostics
        env:
          HOST: ${{ secrets.HOSTGATOR_FTP_SERVER }}
        run: |
          echo "Host: $HOST"
          dig +short A "$HOST" || echo "DNS lookup failed"
          nc -zv -w5 "$HOST" 21 2>&1 && echo "FTP port 21 open" || echo "FTP port 21 closed"

      - name: Deploy via FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          FTP_USER: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          lftp -c "
            set ftp:passive-mode yes;
            set ftp:ssl-allow no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_SERVER;
            mirror --reverse --delete --verbose --exclude .git --exclude node_modules out/ $FTP_REMOTE_DIR;
            bye
          "
