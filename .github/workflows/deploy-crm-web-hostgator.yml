name: Deploy CRM Web (HostGator FTP)

on:
  push:
    branches: ["main"]
    paths:
      - "crm-web/**"
      - ".github/workflows/deploy-crm-web-hostgator.yml"
  workflow_dispatch:

concurrency:
  group: deploy-crm-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm-web/package-lock.json

      - name: Install dependencies
        working-directory: crm-web
        run: npm ci --legacy-peer-deps

      - name: Build (static export)
        working-directory: crm-web
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CRM_WEB_API_BASE_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp mirror
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          FTP_USER: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-allow false;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 3;
            set net:reconnect-interval-max 15;
            set ftp:use-site-utime false;
            open -u '${FTP_USER}','${FTP_PASS}' ftp://${FTP_HOST};
            mirror --reverse --parallel=2 --delete --verbose --log=/tmp/lftp.log ./crm-web/out/ ${REMOTE_DIR}/;
            bye
          " || (cat /tmp/lftp.log 2>/dev/null; exit 1)
