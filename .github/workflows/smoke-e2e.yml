name: Smoke E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

permissions:
  contents: read

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        env:
          PLAYWRIGHT_BASE_URL: https://crm.alexandrequeiroz.com.br
          PLAYWRIGHT_LOGIN_EMAIL: ${{ secrets.PLAYWRIGHT_LOGIN_EMAIL }}
          PLAYWRIGHT_LOGIN_PASSWORD: ${{ secrets.PLAYWRIGHT_LOGIN_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            crm-web/playwright-report
            crm-web/test-results
