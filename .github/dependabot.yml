version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/crm-web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/api-core/src/Diax.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/api-core/src/Diax.Application"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/api-core/src/Diax.Infrastructure"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
