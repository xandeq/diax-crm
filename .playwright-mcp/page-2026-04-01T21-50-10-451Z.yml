            - table
          - generic [ref=e279]:
            - heading "Tips" [level=3] [ref=e281]:
              - generic [ref=e282]: Tips
            - table [ref=e285]:
              - rowgroup [ref=e286]:
                - row [ref=e287]:
                  - cell [ref=e288]:
                    - generic [ref=e289]: Why do you need dedicated pool per site?
                    - text: IIS application pool serves websites and web applications hosted on the server. Dedicated IIS application pool allows you to have a level of isolation between websites. Since each dedicated application pool runs independently, errors in one application pool belonging to one site will not affect the applications running in other application pools dedicated to other sites.
                    - text: For those companies which need reliable and secure websites, hosting dedicated application pool to each site is especially helpful and strongly recommended.
                    - generic [ref=e290]: What do I do if I have sites with different ASP.NET version?
                    - text: Each application pool can only support one .net version. If you need multiple version, please purchase another hosting account or create additional application pool.
                    - generic [ref=e291]: How to fix High memory usage for ASP.NET Core?
                    - text: "Configure the .net core application to use workstation garbage collection will lower the memory consumption. You don't require rebuilding the project, just set the value in the runtimeconfig.json file: \"System.GC.Server\": false"
                    - generic [ref=e292]: How to choose .net version of pool for ASP.NET Core?
                    - text: It is not necessary to change IIS pool setting, because asp.net core IIS module will load .NET Core CLR itself, without IIS intervention. We support .NET 10.x, .NET 9.x, .NET 8.x, .NET 7.x, .NET 6.x, .NET 5.x, .NET Core 3.x and .NET Core 2.x by default.
                    - generic [ref=e293]: Can I run multiple ASP.NET Core APPs?
                    - text: Yes, you can do it as long as you use Out-of-process hosting model in all your core apps or create additional application pool.
                    - text: "[KB Article]"
                    - link "ASP.NET Core does not support multiple apps in the same app pool" [ref=e294] [cursor=pointer]:
                      - /url: https://www.SmarterASP.NET/support/kb/a1999/what-should-we-do-when-get-http-error-500_34-ancm-mixed-hosting-models-not-supportedx
